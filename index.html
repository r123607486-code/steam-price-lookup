<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S-TEAM倒插避震售價查詢</title>
<style>
  :root{
    --blue:#1450a3; --blue-dark:#0d3a7d; --bg:#f2f4f9; --card:#ffffff;
    --text:#1f2430; --muted:#6b7280; --border:#e2e6ee;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
    background:var(--bg); color:var(--text);
  }
  .gate{
    min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column;
    padding:24px; background:linear-gradient(180deg,#f7f9fd 0%,#eef1f8 100%);
  }
  .gate-box{
    background:var(--card); padding:32px 28px; border-radius:16px; box-shadow:0 8px 30px rgba(20,80,163,.12);
    width:100%; max-width:340px; text-align:center;
  }
  .gate-logo{max-width:200px; margin:0 auto 18px; display:block;}
  .gate-box h1{font-size:16px; margin:0 0 18px; color:var(--blue-dark); font-weight:700;}
  .gate-box input{
    width:100%; padding:12px 14px; font-size:16px; border:1px solid var(--border);
    border-radius:8px; margin-bottom:12px; text-align:center; letter-spacing:2px;
  }
  .gate-box button{
    width:100%; padding:12px; font-size:15px; background:var(--blue); color:#fff;
    border:none; border-radius:8px; cursor:pointer; font-weight:600;
  }
  .gate-box button:active{background:var(--blue-dark);}
  .gate-err{color:#c0392b; font-size:13px; margin-top:8px; min-height:18px;}
  .hidden{display:none !important;}

  header{
    background:#ffffff; color:var(--text); padding:14px 16px 12px;
    position:sticky; top:0; z-index:5; box-shadow:0 2px 10px rgba(20,50,90,.06);
  }
  .header-top{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .header-logo{height:34px; width:auto;}
  .header-title{font-size:15px; font-weight:700; color:var(--blue-dark); line-height:1.3;}
  .search-wrap{position:relative; display:flex; gap:8px;}
  #searchBox{
    flex:1; padding:12px 14px; font-size:16px; border:1px solid var(--border); border-radius:10px;
    outline:none; background:var(--bg);
  }
  #filterBtn{
    flex-shrink:0; padding:0 16px; font-size:14px; border:1px solid var(--blue); border-radius:10px;
    background:#fff; color:var(--blue); font-weight:600; cursor:pointer; white-space:nowrap;
  }
  #filterBtn.active{background:var(--blue); color:#fff;}
  .hint{font-size:12px; color:var(--muted); margin-top:8px;}
  main{padding:12px 12px 40px; max-width:720px; margin:0 auto;}
  .count{font-size:13px; color:var(--muted); margin:10px 4px;}
  .card{
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:14px 16px; margin-bottom:10px;
  }
  .card .code{font-weight:700; font-size:15px; color:var(--blue-dark);}
  .card .brand{display:inline-block; font-size:11px; color:#fff; background:#8b95a8; border-radius:5px; padding:1px 7px; margin-left:6px;}
  .card .desc{font-size:13.5px; color:var(--text); margin:6px 0 2px; line-height:1.4;}
  .card .model{font-size:12px; color:var(--muted); margin-bottom:8px;}
  .prices{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px;}
  .price{
    flex:1; min-width:96px; background:var(--bg); border-radius:8px; padding:6px 10px; text-align:center;
  }
  .price .label{font-size:11px; color:var(--muted);}
  .price .val{font-size:15px; font-weight:700; color:var(--blue-dark);}
  .detail-btn{
    width:100%; padding:9px; font-size:13px; border:1px solid var(--blue); border-radius:8px;
    background:#fff; color:var(--blue); font-weight:600; cursor:pointer;
  }
  .detail-btn:active{background:#eaf1fb;}
  .empty{text-align:center; color:var(--muted); padding:40px 10px; font-size:14px;}
  .loading{text-align:center; color:var(--muted); padding:40px 10px; font-size:14px;}

  .overlay{
    position:fixed; inset:0; background:rgba(15,25,45,.5); z-index:20;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .sheet{
    background:#fff; width:100%; max-width:720px; max-height:82vh; overflow-y:auto;
    border-radius:16px 16px 0 0; padding:18px 18px 24px;
  }
  .sheet-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .sheet-head h2{font-size:16px; margin:0; color:var(--blue-dark);}
  .sheet-close{border:none; background:var(--bg); width:30px; height:30px; border-radius:50%; font-size:16px; cursor:pointer; color:var(--muted);}

  .chip-row{display:flex; flex-wrap:wrap; gap:8px;}
  .chip{
    padding:7px 14px; border-radius:20px; border:1px solid var(--border); background:var(--bg);
    font-size:13px; cursor:pointer; color:var(--text);
  }
  .chip.selected{background:var(--blue); border-color:var(--blue); color:#fff; font-weight:600;}
  .chip.all{border-color:var(--blue); color:var(--blue); font-weight:600;}
  .chip.all.selected{background:var(--blue); color:#fff;}

  .detail-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:6px;}
  .detail-item{background:var(--bg); border-radius:8px; padding:8px 10px;}
  .detail-item.full{grid-column:1 / -1;}
  .detail-item .dl{font-size:11px; color:var(--muted); margin-bottom:2px;}
  .detail-item .dv{font-size:13.5px; color:var(--text); font-weight:600; word-break:break-word;}
  .detail-prices{display:flex; gap:8px; margin:14px 0;}
  .detail-prices .price{flex:1;}
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="gate-box">
    <img class="gate-logo" src="logo.png" alt="S-TEAM">
    <h1>S-TEAM倒插避震售價查詢</h1>
    <input type="password" id="pwInput" placeholder="請輸入密碼" inputmode="numeric">
    <button id="pwBtn">進入</button>
    <div class="gate-err" id="pwErr"></div>
  </div>
</div>

<div id="app" class="hidden">
  <header>
    <div class="header-top">
      <img class="header-logo" src="logo.png" alt="S-TEAM">
      <div class="header-title">S-TEAM倒插避震售價查詢</div>
    </div>
    <div class="search-wrap">
      <input id="searchBox" type="text" placeholder="輸入品名 / 車廠 / 車型關鍵字，例如 ALTIS">
      <button id="filterBtn">車廠篩選</button>
    </div>
    <div class="hint" id="hintText">可輸入多個關鍵字，用空白分開（例如「TOYOTA ALTIS」）</div>
  </header>
  <main>
    <div class="count" id="count"></div>
    <div id="results"><div class="loading">資料載入中...</div></div>
  </main>
</div>

<div id="filterOverlay" class="overlay hidden">
  <div class="sheet">
    <div class="sheet-head">
      <h2>選擇車廠</h2>
      <button class="sheet-close" id="filterCloseBtn">✕</button>
    </div>
    <div class="chip-row" id="brandChips"></div>
  </div>
</div>

<div id="detailOverlay" class="overlay hidden">
  <div class="sheet">
    <div class="sheet-head">
      <h2 id="detailTitle">詳細資料</h2>
      <button class="sheet-close" id="detailCloseBtn">✕</button>
    </div>
    <div id="detailBody"></div>
  </div>
</div>

<script>
(function(){
  var PW = "123";
  var gate = document.getElementById('gate');
  var app = document.getElementById('app');
  var pwInput = document.getElementById('pwInput');
  var pwBtn = document.getElementById('pwBtn');
  var pwErr = document.getElementById('pwErr');

  function tryEnter(){
    if(pwInput.value === PW){
      sessionStorage.setItem('steam_ok','1');
      gate.classList.add('hidden');
      app.classList.remove('hidden');
      loadData();
    } else {
      pwErr.textContent = '密碼錯誤，請再試一次';
    }
  }
  pwBtn.addEventListener('click', tryEnter);
  pwInput.addEventListener('keydown', function(e){ if(e.key==='Enter') tryEnter(); });

  if(sessionStorage.getItem('steam_ok') === '1'){
    gate.classList.add('hidden');
    app.classList.remove('hidden');
    loadData();
  }

  var ALL = [];
  var BRANDS = [];
  var loaded = false;
  var selectedBrand = null;

  function loadData(){
    if(loaded) return;
    fetch('manifest.json').then(function(r){return r.json();}).then(function(manifest){
      BRANDS = manifest.brands || [];
      var files = manifest.chunks;
      return Promise.all(files.map(function(f){
        return fetch(f).then(function(r){ return r.json(); });
      }));
    }).then(function(chunkArrays){
      chunkArrays.forEach(function(arr){ ALL = ALL.concat(arr); });
      loaded = true;
      buildBrandChips();
      document.getElementById('results').innerHTML = '';
      render('');
    }).catch(function(err){
      document.getElementById('results').innerHTML = '<div class="empty">資料載入失敗，請重新整理頁面</div>';
      console.error(err);
    });
  }

  function buildBrandChips(){
    var box = document.getElementById('brandChips');
    var html = '<div class="chip all selected" data-brand="">全部車廠</div>';
    html += BRANDS.map(function(b){
      return '<div class="chip" data-brand="'+escapeHtml(b)+'">'+escapeHtml(b)+'</div>';
    }).join('');
    box.innerHTML = html;
    box.querySelectorAll('.chip').forEach(function(chip){
      chip.addEventListener('click', function(){
        box.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('selected'); });
        chip.classList.add('selected');
        selectedBrand = chip.getAttribute('data-brand') || null;
        var filterBtn = document.getElementById('filterBtn');
        if(selectedBrand){
          filterBtn.textContent = selectedBrand;
          filterBtn.classList.add('active');
        } else {
          filterBtn.textContent = '車廠篩選';
          filterBtn.classList.remove('active');
        }
        closeFilter();
        render(document.getElementById('searchBox').value);
      });
    });
  }

  function openFilter(){ document.getElementById('filterOverlay').classList.remove('hidden'); }
  function closeFilter(){ document.getElementById('filterOverlay').classList.add('hidden'); }
  document.getElementById('filterBtn').addEventListener('click', openFilter);
  document.getElementById('filterCloseBtn').addEventListener('click', closeFilter);
  document.getElementById('filterOverlay').addEventListener('click', function(e){
    if(e.target.id === 'filterOverlay') closeFilter();
  });

  function norm(s){
    return (s||'').toString().toLowerCase();
  }

  function matches(row, terms){
    if(selectedBrand && row.brand !== selectedBrand) return false;
    var hay = norm(row.code) + ' ' + norm(row.brand) + ' ' + norm(row.desc) + ' ' + norm(row.model) + ' ' + norm(row.year);
    for(var i=0;i<terms.length;i++){
      if(terms[i] && hay.indexOf(terms[i]) === -1) return false;
    }
    return true;
  }

  function escapeHtml(s){
    return (s||'').toString().replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  var currentList = [];

  function render(query){
    var box = document.getElementById('results');
    var countEl = document.getElementById('count');
    if(!loaded){ box.innerHTML = '<div class="loading">資料載入中...</div>'; return; }

    var terms = norm(query).split(/\s+/).filter(Boolean);
    var list;
    if(terms.length === 0 && !selectedBrand){
      list = [];
    } else {
      list = ALL.filter(function(row){ return matches(row, terms); });
    }
    currentList = list;

    if(terms.length === 0 && !selectedBrand){
      countEl.textContent = '共 ' + ALL.length + ' 筆資料，請輸入關鍵字或選擇車廠開始搜尋';
      box.innerHTML = '';
      return;
    }

    countEl.textContent = '找到 ' + list.length + ' 筆';

    if(list.length === 0){
      box.innerHTML = '<div class="empty">查無相符品項，請換個關鍵字試試</div>';
      return;
    }

    var html = list.slice(0, 200).map(function(row, idx){
      return '' +
        '<div class="card">' +
          '<div><span class="code">'+escapeHtml(row.code)+'</span><span class="brand">'+escapeHtml(row.brand)+'</span></div>' +
          '<div class="desc">'+escapeHtml(row.desc)+'</div>' +
          '<div class="model">'+escapeHtml(row.model)+(row.year? ' ・ '+escapeHtml(row.year):'')+'</div>' +
          '<div class="prices">' +
            '<div class="price"><div class="label">正享進價</div><div class="val">'+escapeHtml(row.dealer)+'</div></div>' +
            '<div class="price"><div class="label">店家售價</div><div class="val">'+escapeHtml(row.store)+'</div></div>' +
            '<div class="price"><div class="label">末端售價</div><div class="val">'+escapeHtml(row.retail)+'</div></div>' +
          '</div>' +
          '<button class="detail-btn" data-idx="'+idx+'">查看詳細資料</button>' +
        '</div>';
    }).join('');

    if(list.length > 200){
      html += '<div class="empty">結果過多，僅顯示前200筆，請輸入更精確的關鍵字</div>';
    }
    box.innerHTML = html;

    box.querySelectorAll('.detail-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        var idx = parseInt(btn.getAttribute('data-idx'), 10);
        showDetail(currentList[idx]);
      });
    });
  }

  function field(label, value, full){
    return '<div class="detail-item'+(full?' full':'')+'"><div class="dl">'+escapeHtml(label)+'</div><div class="dv">'+(value && value.toString().trim() ? escapeHtml(value) : '—')+'</div></div>';
  }

  function showDetail(row){
    if(!row) return;
    document.getElementById('detailTitle').textContent = row.code + '　' + row.brand;
    var html = '';
    html += '<div class="detail-prices">' +
      '<div class="price"><div class="label">正享進價</div><div class="val">'+escapeHtml(row.dealer)+'</div></div>' +
      '<div class="price"><div class="label">店家售價</div><div class="val">'+escapeHtml(row.store)+'</div></div>' +
      '<div class="price"><div class="label">末端售價</div><div class="val">'+escapeHtml(row.retail)+'</div></div>' +
    '</div>';
    html += '<div class="detail-grid">';
    html += field('品名', row.code);
    html += field('車廠', row.brand);
    html += field('車型', row.model);
    html += field('年份', row.year);
    html += field('車種說明', row.desc, true);
    html += field('避震形式', row.susp, true);
    html += field('強化上座(前)', row.rf);
    html += field('強化上座(後)', row.rr);
    html += field('魚眼上座', row.fisheye);
    html += field('前彈簧配置', row.fspring);
    html += field('前彈簧內徑', row.fdia);
    html += field('後彈簧配置', row.rspring);
    html += field('後彈簧內徑', row.rdia);
    html += field('特殊備註', row.remark, true);
    html += '</div>';
    document.getElementById('detailBody').innerHTML = html;
    document.getElementById('detailOverlay').classList.remove('hidden');
  }

  document.getElementById('detailCloseBtn').addEventListener('click', function(){
    document.getElementById('detailOverlay').classList.add('hidden');
  });
  document.getElementById('detailOverlay').addEventListener('click', function(e){
    if(e.target.id === 'detailOverlay') document.getElementById('detailOverlay').classList.add('hidden');
  });

  var searchBox = document.getElementById('searchBox');
  var debounceTimer = null;
  searchBox.addEventListener('input', function(){
    clearTimeout(debounceTimer);
    var v = searchBox.value;
    debounceTimer = setTimeout(function(){ render(v); }, 120);
  });
})();
</script>

</body>
</html>
